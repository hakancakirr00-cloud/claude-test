telegram:
  token_env: TELEGRAM_TOKEN

database:
  path: data/archive.db
  seed_csv: data/seed_archive.csv

matching:
  tolerance: 0.03
  use_close_odds: true
  required_markets:
    - ms1_open
    - ou25_over_open
  match_keys:
    - ms1_open
    - ms1_close
    - msx_open
    - ms2_open
    - ou25_over_open
    - ou25_over_close
    - iy05_over_open
    - btts_yes_open
  max_results: 5000
  min_sample: 5

scraping:
  provider: mackolik
  user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36"
  timeout_seconds: 15
  retries: 3

logging:
  level: INFO
